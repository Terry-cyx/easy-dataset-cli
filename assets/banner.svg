<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360">
  <title>easyds — dataset generation, AI-native</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"    stop-color="#04121a"/>
      <stop offset="0.55" stop-color="#062a2e"/>
      <stop offset="1"    stop-color="#0a2e1f"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.55" stop-color="#34d399"/>
      <stop offset="1" stop-color="#fcd34d"/>
    </linearGradient>
    <linearGradient id="underline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="0.8" stop-color="#34d399" stop-opacity="0.9"/>
      <stop offset="1"   stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glowL" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#0f3540" stroke-width="1" stroke-opacity="0.7">
    <path d="M0 60 H1200 M0 120 H1200 M0 180 H1200 M0 240 H1200 M0 300 H1200"/>
    <path d="M120 0 V360 M240 0 V360 M360 0 V360 M480 0 V360 M600 0 V360 M720 0 V360 M840 0 V360 M960 0 V360 M1080 0 V360"/>
  </g>

  <!-- ambient glows -->
  <circle cx="200" cy="180" r="260" fill="url(#glowL)"/>
  <circle cx="1000" cy="180" r="260" fill="url(#glowR)"/>

  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">

    <!-- eyebrow -->
    <g transform="translate(90 82)">
      <rect x="0" y="0" width="188" height="26" rx="13" fill="#0b1f24" stroke="#22d3ee" stroke-opacity="0.6"/>
      <circle cx="16" cy="13" r="4" fill="#22d3ee"/>
      <text x="28" y="18" font-size="12" font-weight="700" letter-spacing="1.6" fill="#67e8f9">A CLI FOR EASY-DATASET</text>
    </g>

    <!-- wordmark -->
    <text x="90" y="200" font-size="140" font-weight="800" fill="url(#brand)" letter-spacing="-3">easyds</text>
    <rect x="92" y="214" width="430" height="4" rx="2" fill="url(#underline)"/>

    <!-- main tagline -->
    <text x="90" y="258" font-size="30" font-weight="700" fill="#e2e8f0">
      Dataset generation,
      <tspan fill="#fcd34d">AI-native.</tspan>
    </text>

    <!-- subtitle -->
    <text x="90" y="290" font-size="17" font-weight="500" fill="#94a3b8">
      Give your agents a terminal. They'll build their own fine-tuning data.
    </text>

    <!-- chiplets -->
    <g font-size="13" font-weight="600" transform="translate(90 308)">
      <g>
        <rect x="0" y="0" width="86" height="28" rx="14" fill="#0b1f24" stroke="#22d3ee" stroke-opacity="0.65"/>
        <text x="43" y="19" text-anchor="middle" fill="#67e8f9">Alpaca</text>
      </g>
      <g transform="translate(96 0)">
        <rect x="0" y="0" width="96" height="28" rx="14" fill="#0b1f24" stroke="#22d3ee" stroke-opacity="0.65"/>
        <text x="48" y="19" text-anchor="middle" fill="#67e8f9">ShareGPT</text>
      </g>
      <g transform="translate(202 0)">
        <rect x="0" y="0" width="80" height="28" rx="14" fill="#0b1f24" stroke="#34d399" stroke-opacity="0.65"/>
        <text x="40" y="19" text-anchor="middle" fill="#86efac">+ CoT</text>
      </g>
      <g transform="translate(292 0)">
        <rect x="0" y="0" width="104" height="28" rx="14" fill="#0b1f24" stroke="#34d399" stroke-opacity="0.65"/>
        <text x="52" y="19" text-anchor="middle" fill="#86efac">multi-turn</text>
      </g>
      <g transform="translate(406 0)">
        <rect x="0" y="0" width="132" height="28" rx="14" fill="#0b1f24" stroke="#fbbf24" stroke-opacity="0.75"/>
        <text x="66" y="19" text-anchor="middle" fill="#fcd34d">★ agent-native</text>
      </g>
    </g>

    <!-- right-side terminal vignette (symbolic, no workflow steps) -->
    <g transform="translate(720 70)">
      <rect x="0" y="0" width="420" height="220" rx="14" fill="#010a0d" stroke="#0e7490" stroke-opacity="0.75"/>
      <!-- title bar -->
      <rect x="0" y="0" width="420" height="32" rx="14" fill="#06222a"/>
      <rect x="0" y="16" width="420" height="16" fill="#06222a"/>
      <circle cx="18" cy="16" r="6" fill="#ef4444"/>
      <circle cx="38" cy="16" r="6" fill="#eab308"/>
      <circle cx="58" cy="16" r="6" fill="#22c55e"/>
      <text x="210" y="21" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">agent · zsh</text>

      <!-- body: evocative prompt lines, not a real pipeline -->
      <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
        <text x="22" y="70"  fill="#67e8f9">$</text>
        <text x="42" y="70"  fill="#e2e8f0">easyds</text>
        <text x="110" y="70" fill="#cbd5e1">--json</text>
        <text x="172" y="70" fill="#fcd34d">datasets eval</text>
        <text x="290" y="70" fill="#94a3b8">./out.json</text>

        <text x="22" y="100" fill="#86efac">↳ verdict: pass ✓</text>
        <text x="22" y="122" fill="#94a3b8">  8/8 checks · attribution: none</text>

        <text x="22" y="158" fill="#67e8f9">$</text>
        <text x="42" y="158" fill="#e2e8f0">easyds</text>
        <text x="110" y="158" fill="#cbd5e1">--json</text>
        <text x="172" y="158" fill="#fcd34d">export run</text>
        <text x="268" y="158" fill="#94a3b8">-o alpaca.json</text>

        <text x="22" y="188" fill="#86efac">↳ shipped. agent: "ready for SFT."</text>

        <text x="22" y="212" fill="#67e8f9">$</text>
        <rect x="40" y="200" width="10" height="16" fill="#67e8f9">
          <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
        </rect>
      </g>
    </g>

  </g>
</svg>
