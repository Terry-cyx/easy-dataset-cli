<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" width="1000" height="440">
  <title>easyds architecture — agents and humans on one side, Easy-Dataset on the other</title>
  <defs>
    <linearGradient id="bgArch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#04121a"/>
      <stop offset="1" stop-color="#062a2e"/>
    </linearGradient>
    <linearGradient id="cli" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e7490"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="srv" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#065f46"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#34d399"/>
    </marker>
    <marker id="arrL" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M10,0 L0,5 L10,10 z" fill="#22d3ee"/>
    </marker>
  </defs>

  <rect width="1000" height="440" fill="url(#bgArch)"/>

  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">

    <!-- title -->
    <text x="500" y="48" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">A thin HTTP client — all the brain lives on the server</text>
    <text x="500" y="72" text-anchor="middle" fill="#94a3b8" font-size="13">Agents and humans drive easyds; easyds drives Easy-Dataset.</text>

    <!-- LEFT: client card -->
    <g>
      <text x="180" y="112" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="700" letter-spacing="1.4">CLIENT · AGENT OR HUMAN</text>
      <rect x="50" y="128" width="260" height="220" rx="16" fill="url(#cli)" stroke="#22d3ee"/>
      <text x="180" y="178" text-anchor="middle" fill="#ffffff" font-size="34" font-weight="800">easyds</text>
      <text x="180" y="208" text-anchor="middle" fill="#cffafe" font-size="13" font-weight="600">Click · REPL · --json</text>
      <text x="180" y="230" text-anchor="middle" fill="#cffafe" font-size="13">17 command groups</text>
      <text x="180" y="248" text-anchor="middle" fill="#cffafe" font-size="13">stable exit-code protocol</text>

      <line x1="90" y1="272" x2="270" y2="272" stroke="#0e7490" stroke-dasharray="3 4"/>

      <text x="180" y="294" text-anchor="middle" fill="#a5f3fc" font-size="12" font-weight="600">agent skill index (SKILL.md)</text>
      <text x="180" y="312" text-anchor="middle" fill="#a5f3fc" font-size="12">~/.easyds/session.json</text>
      <text x="180" y="330" text-anchor="middle" fill="#a5f3fc" font-size="12">LLM-ready operating rules</text>
    </g>

    <!-- center: wire -->
    <g>
      <path d="M310 220 L660 220" stroke="url(#wire)" stroke-width="3" fill="none" marker-end="url(#arrR)"/>
      <path d="M660 260 L310 260" stroke="url(#wire)" stroke-width="3" fill="none" marker-end="url(#arrL)"/>
      <rect x="400" y="188" width="170" height="28" rx="14" fill="#06222a" stroke="#22d3ee" stroke-opacity="0.6"/>
      <text x="485" y="207" text-anchor="middle" fill="#67e8f9" font-size="13" font-weight="700">HTTP / JSON</text>
      <text x="485" y="282" text-anchor="middle" fill="#86efac" font-size="12" font-weight="600">structured responses</text>
    </g>

    <!-- RIGHT: server card -->
    <g>
      <text x="820" y="112" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="700" letter-spacing="1.4">EASY-DATASET SERVER</text>
      <rect x="660" y="128" width="300" height="220" rx="16" fill="url(#srv)" stroke="#34d399"/>
      <text x="810" y="178" text-anchor="middle" fill="#ffffff" font-size="26" font-weight="800">Next.js · :1717</text>
      <text x="810" y="204" text-anchor="middle" fill="#d1fae5" font-size="13" font-weight="600">the real brain</text>

      <line x1="700" y1="226" x2="920" y2="226" stroke="#064e3b" stroke-dasharray="3 4"/>

      <text x="810" y="250" text-anchor="middle" fill="#a7f3d0" font-size="13">chunkers · GA expander · prompts</text>
      <text x="810" y="270" text-anchor="middle" fill="#a7f3d0" font-size="13">question &amp; answer generation</text>
      <text x="810" y="290" text-anchor="middle" fill="#a7f3d0" font-size="13">eval · blind test · export</text>
      <text x="810" y="310" text-anchor="middle" fill="#d1fae5" font-size="12" font-weight="600">Prisma ORM + background tasks</text>
      <text x="810" y="328" text-anchor="middle" fill="#d1fae5" font-size="12">prompts overridable per project</text>
    </g>

    <!-- bottom row: SQLite + LLM providers -->
    <g>
      <rect x="50" y="372" width="420" height="50" rx="12" fill="#031a1f" stroke="#334155"/>
      <text x="72" y="402" fill="#67e8f9" font-size="13" font-weight="700">📦 SQLite</text>
      <text x="160" y="402" fill="#94a3b8" font-size="12">projects · chunks · questions · datasets · tags · GA pairs · eval</text>

      <rect x="490" y="372" width="470" height="50" rx="12" fill="#031a1f" stroke="#334155"/>
      <text x="512" y="402" fill="#86efac" font-size="13" font-weight="700">🧠 LLM providers</text>
      <text x="622" y="402" fill="#94a3b8" font-size="12">OpenAI · Kimi · Zhipu · Ollama · OpenRouter · Bailian · MiniMax</text>
    </g>

  </g>
</svg>
