<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" width="1000" height="480">
  <title>easyds architecture</title>
  <defs>
    <linearGradient id="bgArch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#04121a"/>
      <stop offset="1" stop-color="#062a2e"/>
    </linearGradient>
    <linearGradient id="cli" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e7490"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="srv" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#065f46"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1000" height="480" fill="url(#bgArch)"/>

  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">

    <!-- LEFT: client side -->
    <g>
      <text x="160" y="40" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="600" letter-spacing="1">CLIENT · AGENT OR HUMAN</text>

      <rect x="40" y="80" width="240" height="130" rx="14" fill="url(#cli)" stroke="#22d3ee"/>
      <text x="160" y="125" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700">easyds</text>
      <text x="160" y="150" text-anchor="middle" fill="#cffafe" font-size="13">Click app · 17 groups · ~80 cmds</text>
      <text x="160" y="170" text-anchor="middle" fill="#cffafe" font-size="13">REPL · `--json` · exit-code protocol</text>
      <text x="160" y="192" text-anchor="middle" fill="#a5f3fc" font-size="12">EDS_BASE_URL · EDS_PROJECT_ID</text>

      <!-- agent skill card -->
      <rect x="40" y="240" width="240" height="100" rx="14" fill="#031a1f" stroke="#0e7490" stroke-dasharray="4 4"/>
      <text x="160" y="270" text-anchor="middle" fill="#67e8f9" font-size="14" font-weight="600">agent skill index</text>
      <text x="160" y="294" text-anchor="middle" fill="#cbd5e1" font-size="13">easyds/skills/SKILL.md</text>
      <text x="160" y="316" text-anchor="middle" fill="#94a3b8" font-size="12">+ 16 reference docs · 9 workflows</text>

      <!-- session state -->
      <rect x="40" y="370" width="240" height="80" rx="14" fill="#031a1f" stroke="#0e7490"/>
      <text x="160" y="398" text-anchor="middle" fill="#67e8f9" font-size="13" font-weight="600">~/.easyds/session.json</text>
      <text x="160" y="420" text-anchor="middle" fill="#94a3b8" font-size="12">current project · base url</text>
      <text x="160" y="438" text-anchor="middle" fill="#94a3b8" font-size="12">active model config</text>
    </g>

    <!-- arrows: client ↔ server -->
    <g stroke="#94a3b8" stroke-width="2" fill="none">
      <path d="M280 130 L460 130" marker-end="url(#arrow)"/>
      <path d="M460 165 L280 165" marker-end="url(#arrow)"/>
    </g>
    <text x="370" y="120" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="600">HTTP / JSON</text>
    <text x="370" y="185" text-anchor="middle" fill="#94a3b8" font-size="11">project · model · chunks · datasets</text>

    <!-- RIGHT: server side -->
    <g>
      <text x="700" y="40" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="600" letter-spacing="1">EASY-DATASET SERVER</text>
      <rect x="460" y="80" width="500" height="370" rx="14" fill="#04121a" stroke="#334155"/>

      <rect x="490" y="110" width="220" height="100" rx="12" fill="url(#srv)" stroke="#34d399"/>
      <text x="600" y="148" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700">Next.js · :1717</text>
      <text x="600" y="172" text-anchor="middle" fill="#d1fae5" font-size="13">/api/projects/{id}/…</text>
      <text x="600" y="192" text-anchor="middle" fill="#a7f3d0" font-size="12">no auth · localhost-first</text>

      <!-- pipeline services -->
      <rect x="730" y="110" width="210" height="320" rx="12" fill="#062a2e" stroke="#334155"/>
      <text x="835" y="135" text-anchor="middle" fill="#cbd5e1" font-size="13" font-weight="600">pipeline services</text>
      <g font-size="12" fill="#e2e8f0">
        <text x="745" y="160">• files          (multipart upload)</text>
        <text x="745" y="180">• split          (chunks + tags)</text>
        <text x="745" y="200">• ga             (genre × audience)</text>
        <text x="745" y="220">• questions      (templates · custom)</text>
        <text x="745" y="240">• datasets       (answers + cot)</text>
        <text x="745" y="260">• eval           (multi-dim scoring)</text>
        <text x="745" y="280">• blind-test     (model A vs B)</text>
        <text x="745" y="300">• distill        (no-source pipeline)</text>
        <text x="745" y="320">• export         (alpaca · sharegpt · cot)</text>
      </g>
      <text x="835" y="360" text-anchor="middle" fill="#94a3b8" font-size="11">Prisma ORM · background tasks</text>
      <text x="835" y="378" text-anchor="middle" fill="#94a3b8" font-size="11">prompts overridable per project</text>

      <!-- storage -->
      <rect x="490" y="240" width="220" height="80" rx="12" fill="#062a2e" stroke="#334155"/>
      <text x="600" y="267" text-anchor="middle" fill="#cbd5e1" font-size="13" font-weight="600">SQLite · prisma/db.sqlite</text>
      <text x="600" y="290" text-anchor="middle" fill="#94a3b8" font-size="12">projects · chunks · questions</text>
      <text x="600" y="308" text-anchor="middle" fill="#94a3b8" font-size="12">datasets · tags · ga · eval</text>

      <!-- LLM providers -->
      <rect x="490" y="340" width="220" height="90" rx="12" fill="#062a2e" stroke="#334155"/>
      <text x="600" y="365" text-anchor="middle" fill="#cbd5e1" font-size="13" font-weight="600">LLM providers</text>
      <text x="600" y="386" text-anchor="middle" fill="#86efac" font-size="12">OpenAI · Ollama · Zhipu · Kimi</text>
      <text x="600" y="404" text-anchor="middle" fill="#86efac" font-size="12">OpenRouter · Bailian · MiniMax</text>
      <text x="600" y="422" text-anchor="middle" fill="#94a3b8" font-size="11">configured per project (model set)</text>

      <path d="M710 160 L730 160" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
      <path d="M600 210 L600 240" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
      <path d="M600 320 L600 340" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
    </g>
  </g>
</svg>
